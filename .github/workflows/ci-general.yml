# --------------------------------------------------
# CI General workflow.
#
# Handles code quality checks for pull requests to release branches.
# Uses pull_request to safely execute untrusted code
# from forks without elevated privileges.
#
# Jobs run in parallel. Node.js npm cache is shared
# across jobs via setup-node's built-in cache support,
# keyed by package-lock.json hash for precise invalidation.
#
# For more information please see:
# https://docs.github.com/en/actions/writing-workflows
# --------------------------------------------------

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "CI General"

on:
  pull_request:
    branches:
      - "main"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}"
  cancel-in-progress: true

# Deny all by default, jobs declare their own permissions as needed
permissions: {}

jobs:
  # --------------------------------------------------
  # Audit - runs the npm audit script to check for
  # vulnerable production dependencies.
  # --------------------------------------------------
  audit:
    name: "audit"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v6.0.3"

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Audit dependencies"
        run: "npm run audit"

  # --------------------------------------------------
  # Format check - validates code formatting
  # using Prettier
  # --------------------------------------------------
  prettier:
    name: "prettier"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v6.0.3"

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Check formatting"
        run: "npm run format:check"

  # --------------------------------------------------
  # Markdown lint - validates markdown files
  # --------------------------------------------------
  markdownlint:
    name: "markdownlint"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v6.0.3"

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Lint markdown"
        run: "npm run lint:md"

  # --------------------------------------------------
  # Spell check - validates spelling across all files
  # using cspell. Cache is keyed by package-lock.json,
  # .cspell.json, dictionary.txt and .nvmrc since a Node
  # version change can affect cspell's binary behaviour.
  # --------------------------------------------------
  spellcheck:
    name: "spellcheck"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v6.0.3"

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Restore cspell cache"
        id: "cspell-cache-restore"
        uses: "actions/cache/restore@v5"
        with:
          path: ".cache/.cspellcache"
          key: >-
            cspell-${{ runner.os }}-${{ hashFiles('package-lock.json', '.cspell.json', 'dictionary.txt', '.nvmrc') }}
          restore-keys: |
            cspell-${{ runner.os }}-

      - name: "Spell check"
        run: "npm run lint:spell"

      - name: "Save cspell cache"
        if: "always() && steps.cspell-cache-restore.outputs.cache-hit != 'true'"
        uses: "actions/cache/save@v5"
        with:
          path: ".cache/.cspellcache"
          key: >-
            cspell-${{ runner.os }}-${{ hashFiles('package-lock.json', '.cspell.json', 'dictionary.txt', '.nvmrc') }}

  # --------------------------------------------------
  # Knip - checks for unused dependencies
  # --------------------------------------------------
  knip:
    name: "knip"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v6.0.3"

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Check unused dependencies"
        run: "npm run deps:unused"

