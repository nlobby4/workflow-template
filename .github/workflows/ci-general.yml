# --------------------------------------------------
# CI General workflow.
#
# Handles code quality checks for pull requests to main.
# Uses pull_request to safely execute untrusted code
# from forks without elevated privileges.
#
# Jobs run in parallel. Node.js npm cache is shared
# across jobs via setup-node's built-in cache support,
# keyed by package-lock.json hash for precise invalidation.
#
# For more information please see:
# https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#pull_request
# --------------------------------------------------

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI General

on:
  pull_request:
    branches: [main]

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.14.1
  NPM_CONFIG_LOGLEVEL: error

jobs:
  # --------------------------------------------------
  # Audit - checks for known vulnerabilities in
  # production dependencies
  # --------------------------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm run audit

  # --------------------------------------------------
  # Format check - validates code formatting
  # using Prettier
  # --------------------------------------------------
  prettier:
    name: prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

  # --------------------------------------------------
  # Markdown lint - validates markdown files
  # --------------------------------------------------
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint markdown
        run: npm run lint:md

  # --------------------------------------------------
  # Spell check - validates spelling across all files
  # using cspell. Cache is keyed by package-lock.json
  # and .cspell.json only since dictionary changes
  # are the only reason to invalidate the cache,
  # not file content changes.
  # --------------------------------------------------
  spellcheck:
    name: spellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Restore cspell cache
        id: cspell-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: .cache
          key: >-
            cspell-${{ runner.os }}-${{ hashFiles('package-lock.json',
            '.cspell.json') }}
          restore-keys: |
            cspell-${{ runner.os }}-

      - name: Spell check
        run: npm run lint:spell

      - name: Save cspell cache
        if: steps.cspell-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .cache
          key: >-
            cspell-${{ runner.os }}-${{ hashFiles('package-lock.json',
            '.cspell.json') }}

  # --------------------------------------------------
  # Knip - checks for unused dependencies, exports,
  # and files
  # --------------------------------------------------
  knip:
    name: knip
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check unused dependencies
        run: npm run deps:unused

