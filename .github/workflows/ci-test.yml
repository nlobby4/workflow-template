# --------------------------------------------------
# CI Test workflow.
#
# Handles code quality checks for pull requests to release branches.
# Uses pull_request to safely execute untrusted code
# from forks without elevated privileges.
#
# Jobs run in parallel. Node.js npm cache is shared
# across jobs via setup-node's built-in cache support,
# keyed by package-lock.json hash for precise invalidation.
#
# For more information please see:
# https://docs.github.com/en/actions/writing-workflows
# --------------------------------------------------

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "CI Test"
on:
  pull_request:
    branches:
      - "main"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}"
  cancel-in-progress: true

# Deny all by default, jobs declare their own permissions as needed
permissions: {}

jobs:
  # --------------------------------------------------
  # Test - runs code quality checks.
  # --------------------------------------------------
  test:
    name: "test"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read"
    steps:
      - uses: "actions/checkout@v6.0.3"

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Test"
        run: "npm test"
