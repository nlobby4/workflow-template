# --------------------------------------------------
# CI Release workflow.
#
# Triggers semantic-release on every push to main.
# Semantic-release analyzes commits since the last release,
# determines the next version, generates a changelog,
# packages the project, creates a git tag, publishes a GitHub release via a
# GitHub App with branch protection bypass permissions,
# and publishes the package to npm via OIDC trusted publishing if configured.
# See the release.config.js file for details.
#
# No NPM_TOKEN is used, authentication relies on the OIDC token generated by
# GitHub Actions ("id-token: write" permission) which npm exchanges for a
# short-lived publish credential at runtime.
#
# Provenance attestations are published automatically by npm when using trusted
# publishing from GitHub Actions.
#
# NOTE: The CI workflow must run on Node >= 22.14.0 and npm >= 11.5 for npm OIDC
#       trusted publishing support.
#
# For more information please see:
# https://docs.github.com/en/actions/writing-workflows
# https://semantic-release.gitbook.io/semantic-release
# https://docs.npmjs.com/trusted-publishers
# --------------------------------------------------

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: "CI Release"

on:
  push:
    branches:
      - "main"

concurrency:
  group: "release"
  cancel-in-progress: false

# Deny all by default, jobs declare their own permissions as needed
permissions: {}

jobs:
  # --------------------------------------------------
  # Semantic Release - analyzes commits, bumps version,
  # generates changelog, and publishes to the configured
  # release channels.
  #
  # conventional-changelog-conventionalcommits is pinned
  # alongside the semantic-release plugins.
  # --------------------------------------------------
  release:
    name: "release"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "write"
      issues: "write"
      pull-requests: "write"
      id-token: "write"
    steps:
      - name: "Generate Token"
        id: "app-token"
        uses: "actions/create-github-app-token@v3"
        with:
          client-id: "${{ secrets.AUTO_CHAN_CLIENT_ID }}"
          private-key: "${{ secrets.AUTO_CHAN_PRIVATE_KEY }}"

      - uses: "actions/checkout@v6.0.3"
        with:
          token: "${{ steps.app-token.outputs.token }}"
          fetch-depth: 0
          persist-credentials: false

      - uses: "actions/setup-node@v6"
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: "Get bot user ID"
        id: "bot-user-id"
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: "${{ steps.app-token.outputs.token }}"

      - name: "Install dependencies"
        run: "npm ci --ignore-scripts"

      - name: "Release"
        run: |
          npx -y \
            --package semantic-release@25 \
            --package @semantic-release/commit-analyzer@13.0.1 \
            --package @semantic-release/release-notes-generator@14.1.0 \
            --package @semantic-release/exec@7.1.0 \
            --package @semantic-release/changelog@6.0.3 \
            --package @semantic-release/npm@13.1.5 \
            --package @semantic-release/git@10.0.1 \
            --package @semantic-release/github@12.0.6 \
            --package conventional-changelog-conventionalcommits@8 \
            semantic-release
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          GIT_AUTHOR_NAME: "${{ steps.app-token.outputs.app-slug }}[bot]"
          GIT_AUTHOR_EMAIL: >-
            ${{ steps.bot-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: "${{ steps.app-token.outputs.app-slug }}[bot]"
          GIT_COMMITTER_EMAIL: >-
            ${{ steps.bot-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
