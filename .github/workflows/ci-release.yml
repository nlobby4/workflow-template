# --------------------------------------------------
# CI Release workflow.
#
# Triggers semantic-release on pushes to release
# branches after a pull request is merged. Analyzes
# commits since the last release, determines the next
# version, generates a changelog, packages the project,
# creates a git tag, and publishes a GitHub release via
# a GitHub App with branch protection bypass permissions.
#
# Commit types that trigger a release:
#   feat  -> minor
#   fix   -> patch
#   perf  -> patch
#   breaking change (any type) -> major
#
# For more information please see:
# https://semantic-release.gitbook.io/semantic-release
# --------------------------------------------------

# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Release

on:
  push:
    branches:
      - main
      - beta
      - alpha
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

env:
  NPM_CONFIG_LOGLEVEL: error

jobs:
  # --------------------------------------------------
  # Release - analyzes commits since the last release,
  # determines the next version, generates changelog,
  # packages the project, creates a git tag, and
  # publishes a GitHub release via semantic-release.
  #
  # conventional-changelog-conventionalcommits is pinned
  # alongside the semantic-release plugins.
  # --------------------------------------------------
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.AUTO_CHAN_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_CHAN_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Get bot user ID
        id: bot-user-id
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Release
        run: |
          npx -y \
            --package semantic-release@25 \
            --package @semantic-release/commit-analyzer@13.0.1 \
            --package @semantic-release/release-notes-generator@14.1.0 \
            --package @semantic-release/exec@7.1.0 \
            --package @semantic-release/changelog@6.0.3 \
            --package @semantic-release/npm@13.1.5 \
            --package @semantic-release/git@10.0.1 \
            --package @semantic-release/github@12.0.6 \
            --package conventional-changelog-conventionalcommits@8 \
            semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: >-
            ${{ steps.bot-user-id.outputs.user-id }}+${{
            steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: >-
            ${{ steps.bot-user-id.outputs.user-id }}+${{
            steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
